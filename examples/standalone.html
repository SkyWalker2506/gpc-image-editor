<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>gpc-image-editor — standalone demo</title>
<link rel="stylesheet" href="../src/image-editor.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0e1117; color: #e8eaf0; font: 500 13px system-ui, sans-serif; }
  .demo {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100%;
  }
  .demo > header {
    padding: 10px 14px;
    background: #1a1d24;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .demo > header input { padding: 5px 8px; background: #232733; color: #fff; border: 1px solid rgba(255,255,255,0.18); border-radius: 4px; min-width: 320px; }
  #host { width: 100%; height: 100%; }
  #out  { background: #232733; padding: 8px; font-family: monospace; font-size: 11px; max-height: 120px; overflow: auto; }
</style>
</head>
<body>
<div class="demo">
  <header>
    <strong>image-editor demo</strong>
    <input id="src" placeholder="image URL" value="https://placehold.co/512x320/png">
    <button id="load">Load</button>
  </header>
  <div id="host"></div>
  <pre id="out"></pre>
</div>
<script src="../src/image-editor.js"></script>
<script>
  let inst = null;
  function mount(src) {
    if (inst) inst.destroy();
    inst = window.ImageEditor.mount({
      container: document.getElementById('host'),
      src,
      onChange: (e) => { document.getElementById('out').textContent = JSON.stringify(window.ImageEditor.compactEdits(e), null, 2); },
      onApply:  (e) => alert('Apply\n' + JSON.stringify(window.ImageEditor.compactEdits(e), null, 2)),
      onCancel: () => alert('Cancel')
    });
  }
  document.getElementById('load').addEventListener('click', () => mount(document.getElementById('src').value));
  mount(document.getElementById('src').value);
</script>
</body>
</html>
